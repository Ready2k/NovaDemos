AWSTemplateFormatVersion: '2010-09-09'
Description: 'Voice S2S AWS & Amazon Connect Infrastructure (Phase 1 and 2)'
Parameters:
  ConnectInstanceArn:
    Type: String
    Description: 'ARN of the Amazon Connect Instance'
  CertificateArn:
    Type: String
    Description: 'ARN of the ACM certificate for HTTPS (Leave empty for HTTP-only testing)'
    Default: ''
  LangfuseSecretArn:
    Type: String
    Description: 'ARN of the Secrets Manager secret containing Langfuse credentials'
    Default: 'arn:aws:secretsmanager:us-east-1:123456789012:secret:voice-s2s/langfuse-Dummy'
  ImageUri:
    Type: String
    Description: 'URI of the Docker image for the ECS task'
    Default: 'nginx:latest'
  NovaSonicModelId:
    Type: String
    Description: 'Bedrock Nova Sonic Model ID'
    Default: 'amazon.nova-2-sonic-v1:0'
  DeployBucket:
    Type: String
    Description: 'S3 bucket that holds Lambda deployment packages (created separately, must exist before stack deploy)'
  KvsBridgePackageS3Key:
    Type: String
    Description: 'S3 key for the KVS bridge Lambda zip — produced by aws/lambdas/build.sh'
    Default: 'lambdas/kvs-bridge.zip'
  EcsEndpoint:
    Type: String
    Description: 'Internal HTTP URL for the ECS service (e.g. http://internal-alb-dns or http://localhost:8080 for local dev). Used by StartBotSession Lambda to notify ECS of new calls.'
    Default: ''

Conditions:
  HasCert: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # --------------------------------------------------------------------------
  # VPC & Networking
  # --------------------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: '10.0.1.0/24'
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs '' ]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: '10.0.2.0/24'
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 1, !GetAZs '' ]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: '10.0.11.0/24'
      AvailabilityZone: !Select [ 0, !GetAZs '' ]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: '10.0.12.0/24'
      AvailabilityZone: !Select [ 1, !GetAZs '' ]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # --------------------------------------------------------------------------
  # Storage
  # --------------------------------------------------------------------------
  SessionLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Allow Amazon Connect to read WAV response files that ECS uploads.
  SessionLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SessionLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: connect.amazonaws.com
            Action: 's3:GetObject'
            Resource: !Sub '${SessionLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref AWS::AccountId

  # DynamoDB session state table for the KVS bridge Lambdas.
  VoiceSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: 'voice_s2s_sessions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # --------------------------------------------------------------------------
  # Load Balancing
  # --------------------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow HTTP/HTTPS traffic to ALB'
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: 'voice-s2s-alb'
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '3600' # Required for WebSockets long calls

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '3600'

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCert
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCert
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # --------------------------------------------------------------------------
  # ECS Fargate
  # --------------------------------------------------------------------------
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Allow traffic from ALB'
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: 'voice-s2s-cluster'

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/ecs/voice-s2s'
      RetentionInDays: 7

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: 'SecretsAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Ref LangfuseSecretArn

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'VoiceS2SAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModelWithResponseStream'
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithBidirectionalStream'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'transcribe:StartStreamTranscription'
                  - 'transcribe:StartStreamTranscriptionWebSocket'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                Resource: !Sub '${SessionLogsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Ref LangfuseSecretArn
              - Effect: Allow
                Action:
                  - 'cloudwatch:PutMetricData'
                Resource: '*'
              # KVS real-time streaming (Connect KVS bridge)
              - Effect: Allow
                Action:
                  - 'kinesisvideo:GetDataEndpoint'
                  - 'kinesisvideo:GetMedia'
                Resource: '*'
              # DynamoDB access for Connect session state
              - Effect: Allow
                Action:
                  - 'dynamodb:GetItem'
                  - 'dynamodb:UpdateItem'
                Resource: !GetAtt VoiceSessionsTable.Arn

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: 'voice-s2s-task'
      Cpu: '1024'
      Memory: '2048'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: 'voice-s2s'
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: NOVA_AWS_REGION
              Value: !Ref AWS::Region
            - Name: NOVA_SONIC_MODEL_ID
              Value: !Ref NovaSonicModelId
            - Name: SESSION_TABLE
              Value: !Ref VoiceSessionsTable
            - Name: RESPONSE_BUCKET
              Value: !Ref SessionLogsBucket
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      Cluster: !Ref EcsCluster
      ServiceName: 'voice-s2s-service'
      TaskDefinition: !Ref EcsTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: 'voice-s2s'
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60

  # --------------------------------------------------------------------------
  # Phase 2: Connect Lambdas & Infrastructure
  # --------------------------------------------------------------------------
  ConnectIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: 'ConnectIntegrationPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kinesisvideo:GetDataEndpoint'
                  - 'kinesisvideo:GetMedia'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModelWithBidirectionalStream'
                  - 'bedrock:InvokeModel'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                Resource: !Sub '${SessionLogsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 'dynamodb:PutItem'
                  - 'dynamodb:GetItem'
                  - 'dynamodb:UpdateItem'
                Resource: !GetAtt VoiceSessionsTable.Arn

  StartBotSessionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: 'voice-s2s-StartBotSession'
      Runtime: nodejs20.x
      Role: !GetAtt ConnectIntegrationRole.Arn
      Handler: start-session.handler
      Timeout: 15
      MemorySize: 256
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: !Ref KvsBridgePackageS3Key
      Environment:
        Variables:
          SESSION_TABLE: !Ref VoiceSessionsTable
          ECS_ENDPOINT: !Sub '${EcsEndpoint}/connect/call-start'

  GetBotResultLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: 'voice-s2s-GetBotResult'
      Description: 'Polls DynamoDB until ECS signals a Nova Sonic turn is complete, then returns the WAV S3 URI and intent to Connect.'
      Runtime: nodejs20.x
      Role: !GetAtt ConnectIntegrationRole.Arn
      Handler: get-bot-result.handler
      Timeout: 10
      MemorySize: 256
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: !Ref KvsBridgePackageS3Key
      Environment:
        Variables:
          SESSION_TABLE: !Ref VoiceSessionsTable
          RESPONSE_BUCKET: !Ref SessionLogsBucket

  GetBotResultLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref GetBotResultLambda
      Principal: 'connect.amazonaws.com'
      SourceArn: !Ref ConnectInstanceArn

  ProcessBotTurnLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: 'voice-s2s-ProcessBotTurn'
      Runtime: nodejs20.x
      Role: !GetAtt ConnectIntegrationRole.Arn
      Handler: process-turn.handler
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: !Ref KvsBridgePackageS3Key
      Environment:
        Variables:
          SESSION_TABLE: !Ref VoiceSessionsTable
          RESPONSE_BUCKET: !Ref SessionLogsBucket
          NOVA_SONIC_MODEL_ID: !Ref NovaSonicModelId

  StartBotSessionLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref StartBotSessionLambda
      Principal: 'connect.amazonaws.com'
      SourceArn: !Ref ConnectInstanceArn

  ProcessBotTurnLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref ProcessBotTurnLambda
      Principal: 'connect.amazonaws.com'
      SourceArn: !Ref ConnectInstanceArn

