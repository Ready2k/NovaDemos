Outputs:
  AlbUrl:
    Description: 'HTTP URL of the ALB'
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
  SessionLogsBucketName:
    Description: 'S3 Bucket for Session Logs'
    Value: !Ref SessionLogsBucket
  VoiceSessionsTableName:
    Description: 'DynamoDB table for Connect session state'
    Value: !Ref VoiceSessionsTable
  GetBotResultLambdaArn:
    Description: 'ARN of the GetBotResult Lambda'
    Value: !GetAtt GetBotResultLambda.Arn
  StartBotSessionLambdaArn:
    Description: 'ARN of the StartBotSession Lambda'
    Value: !GetAtt StartBotSessionLambda.Arn
  ProcessBotTurnLambdaArn:
    Description: 'ARN of the ProcessBotTurn Lambda'
    Value: !GetAtt ProcessBotTurnLambda.Arn
